services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gioco_chimica
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/gioco_chimica?sslmode=disable}
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      DBMATE_MIGRATIONS_DIR: /app/backend/db/migrations
      PORT: 3000
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3000}
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data:
