services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/dist:/usr/share/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gioco_chimica
    # Memory-optimized flags for a 1GB RAM server
    command: >
      postgres 
      -c shared_buffers=128MB 
      -c work_mem=4MB 
      -c max_connections=20
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gioco_chimica"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fastify_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/gioco_chimica?sslmode=disable}
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      DBMATE_MIGRATIONS_DIR: /app/backend/db/migrations
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  caddy_data:
  caddy_config:
